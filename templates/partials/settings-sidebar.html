<!-- @title: Settings section nav partial -->
<!-- @surface: backoffice -->
<!--
  settings-sidebar.html: in-content section nav for the Settings area.

  Lives inside u-main__body--split as the u-main__sidebar. NOT a bt-sidebar —
  that is the shell's app nav (main-sidebar.html). This is a secondary,
  page-level nav listing the settings sections, each a real route.

  Three real pages, stable URLs — no anchor scrolling. Section nav links are
  plain Bootstrap .nav-link; the active one gets .active + aria-current="page".

  Work scope is curator-only in production (gated by Grants). Roles do not
  exist in the prototype yet, so it renders unconditionally for everyone.

  HOW TO USE IN PROTOTYPES
  Place the include at the u-main__sidebar injection point, then the active key:

    @include templates/partials/settings-sidebar.html
    @active profile | accounts | scope

  The local renderer adds active + aria-current="page" to the matching
  data-nav-key link.

  HOW TO USE IN GO TEMPL
  templ SettingsSidebar(currentPage string, grants Grants) {
    Render Profile and Connected accounts always; render Work scope only when
    grants allow curation. Mark the currentPage link active + aria-current.
  }
-->

<nav class="nav flex-column" aria-label="Settings sections">
  <p class="bt-sidebar__group-label mt-4">Settings</p>

  <a href="/templates/biblio-researcher/settings-profile.html" class="nav-link" data-nav-key="profile">
    Profile settings
  </a>
  <a href="/templates/biblio-researcher/settings-accounts.html" class="nav-link" data-nav-key="accounts">
    Connected accounts
  </a>
  <a href="/templates/biblio-researcher/settings-scope.html" class="nav-link" data-nav-key="scope">
    Curation work scope
  </a>
</nav>
