<!--
  search-filter-bar.html
  ──────────────────────
  Reusable filter bar: chips + Add filter dropdown + filter editor panel.
  Used on all search pages (public + backoffice) and entity result pages.

  @include: templates/partials/search-filter-bar.html

  ── How it works in the prototype ──────────────────────────────────────────
  filter-editor.js manages all chip state in JS — no network calls needed.
  Applying a filter adds a chip. Clicking a chip re-opens the editor.
  Clear all removes all chips. This is sufficient for user testing.

  The HTMX attributes on the search input (hx-get, hx-target etc.) are stubs
  that document intended production behaviour — they do nothing without a
  real endpoint.

  ── Surface-aware filter list ──────────────────────────────────────────────
  Backoffice-only filter groups live in the DOM but are hidden on the public
  surface via data-surface on the layout ancestor:

    [data-surface="public"] .filter-group--backoffice-only { display: none }

  These rules currently live in the shared pattern partial
  assets/scss/patterns/_booktower-components.scss.

  ── biblio:filter-add ──────────────────────────────────────────────────────
  Autocomplete suggest rows (Org, Project, Keyword) can add a chip directly
  by dispatching this event — no editor panel opens:

    document.dispatchEvent(new CustomEvent('biblio:filter-add', {
      detail: { filterId: 'affiliation', displayValue: 'Sciences', rawValue: 'fw' }
    }));
-->

<!-- position-relative anchors the editor overlay so it floats over the results
     (position-absolute) instead of pushing them down when it opens. -->
<div class="position-relative">

<!-- ── Chips row ───────────────────────────────────────────────────────────── -->
<div class="d-flex flex-wrap align-items-center">

  <!-- Active filter chips — managed by filter-editor.js -->
  <div role="group"
    aria-label="Active filters"
    class="d-flex gap-2 flex-wrap align-items-center"
    id="active-chips">
  </div>

  <!-- Add filter dropdown ─────────────────────────────────────────────────── -->
  <div class="dropdown" id="add-filter-dropdown">
    <button class="btn btn-ghost btn-sm" type="button"
      id="add-filter-btn"
      data-bs-toggle="dropdown"
      data-bs-auto-close="outside"
      aria-expanded="false">
      <i class="if if-add if--xs" aria-hidden="true"></i>
      Add filter
    </button>

    <div class="dropdown-menu p-0">

      <div id="filter-picker-list" class="bt-dropdown-scroll">

        <div role="group" aria-label="Type">
          <div class="dropdown-header" aria-hidden="true">Type</div>
          <button class="dropdown-item" type="button" data-filter="type">Type</button>
          <button class="dropdown-item filter-group--backoffice-only" type="button" data-filter="subtype">Subtype</button>
        </div>

        <div role="group" aria-label="People">
          <div class="dropdown-header" aria-hidden="true">People</div>
          <button class="dropdown-item" type="button" data-filter="affiliation">Affiliation / faculty</button>
          <button class="dropdown-item filter-group--backoffice-only" type="button" data-filter="research_group">Research group</button>
        </div>

        <div role="group" aria-label="Time">
          <div class="dropdown-header" aria-hidden="true">Time</div>
          <button class="dropdown-item" type="button" data-filter="year">Publication year</button>
          <button class="dropdown-item filter-group--backoffice-only" type="button" data-filter="created_since">Created since</button>
          <button class="dropdown-item filter-group--backoffice-only" type="button" data-filter="updated_since">Updated since</button>
        </div>

        <div role="group" aria-label="Context">
          <div class="dropdown-header" aria-hidden="true">Context</div>
          <button class="dropdown-item filter-group--backoffice-only" type="button" data-filter="project">Project / funding</button>
          <button class="dropdown-item" type="button" data-filter="venue">Journal / venue</button>
        </div>

        <div role="group" aria-label="Access &amp; files">
          <div class="dropdown-header" aria-hidden="true">Access &amp; files</div>
          <button class="dropdown-item" type="button" data-filter="open_access">Open access</button>
          <button class="dropdown-item" type="button" data-filter="has_file">Has file</button>
        </div>

        <div role="group" aria-label="Status &amp; workflow" class="filter-group--backoffice-only">
          <div class="dropdown-header" aria-hidden="true">Status &amp; workflow</div>
          <button class="dropdown-item" type="button" data-filter="status">Biblio status</button>
          <button class="dropdown-item" type="button" data-filter="pub_status">Publication status</button>
          <button class="dropdown-item" type="button" data-filter="tags">Librarian tags</button>
        </div>

        <div role="group" aria-label="Classification">
          <div class="dropdown-header" aria-hidden="true">Classification</div>
          <button class="dropdown-item" type="button" data-filter="keywords">Keywords</button>
        </div>

      </div>
    </div>
  </div>

  <!-- Clear all — hidden until chips are present -->
  <button type="button" class="btn btn-ghost btn-sm" id="clear-all-btn" hidden>
    <i class="if if-close if--xs" aria-hidden="true"></i>
    Clear all
  </button>

  <!-- HTMX indicator — must exist in DOM at page load for aria-live -->
  <span id="search-indicator" class="htmx-indicator text-muted small" aria-live="polite">
    Searching&hellip;
  </span>

</div><!-- /chips row -->

<!-- Filter editor panel — must exist in DOM at page load, never HTMX-injected.
     Overlays the results (position-absolute) rather than pushing them down. -->
<div id="filter-editor"
  class="bt-panel bt-panel--wide position-absolute top-100 start-0 w-100 mt-2"
  role="dialog"
  aria-modal="false"
  aria-labelledby="filter-editor-title"
  hidden>
</div>

</div><!-- /position-relative wrapper -->
