<!--
  backoffice-facet-sidebar.html
  ─────────────────────────────
  The filter sidebar for backoffice search pages.
  Used inside u-main__body as the left <aside>.

  @include: templates/partials/backoffice-facet-sidebar.html

  ── What this contains ─────────────────────────────────────────────────────
  1. Scope indicator — reads from user settings, links to Settings > Work scope
     Curator/proxy only. Shows active org(s) and type restrictions.
  2. Saved views — named filter presets (URLs), curator/proxy only
  3. Facet groups — Status, Type, Year, Access
     These mirror the same filter params as the Add filter dropdown in the
     filter bar. No special logic — checkboxes map to identical query params.
  4. More filters — overflow dropdown for less-used dimensions

  ── What this does NOT contain ─────────────────────────────────────────────
  - The search input (lives in the results toolbar)
  - Filter chips (live in the filter bar partial above results)
  - Navigation links (that's backoffice-sidebar.html — the nav partial)

  ── Relationship to backoffice-sidebar.html ────────────────────────────────
  backoffice-sidebar.html  = the left nav rail (Dashboard, Research output,
                             Suggestions…). Always present. Layout element.
  backoffice-facet-sidebar = the filter <aside> inside the main content area.
                             Only present on search pages.

  ── Prototype states shown ─────────────────────────────────────────────────
  This file shows the "curator with scope set" state:
  - 2 org scopes (Sciences + Engineering)
  - 2 type scopes (Dataset, Dissertation)
  - Saved view "Needs review" active
  - Status: Submitted pre-checked

  To prototype "no scope set", comment out the scope block content and
  uncomment the empty state variant.

  ── Go templ parameters (future reference) ─────────────────────────────────
  scopeOrgs      []Org     active scope organisations
  scopeTypes     []string  active scope types (empty = all)
  savedViews     []View    system + user saved views
  activeViewID   string    ID of active view (for aria-current)
  facets         Facets    counts from OpenSearch per facet group
-->

<aside class="bt-sidebar bt-sidebar--bordered" aria-label="Filter by">

  <!-- ── Scope ──────────────────────────────────────────────────────────────
       Reads from user_settings.scope_orgs[] and scope_types[].
       Rendering rules:
       - 0 orgs → "All organisations" in muted text
       - 1 org  → full name
       - 2 orgs → both names
       - 3+ orgs → first two + "+N more" link to settings
       - Types → primary badges, omitted if all types in scope
       Edit icon links to Settings — scope is not changed inline here.
  ──────────────────────────────────────────────────────────────────────── -->
  <div class="mb-3">
    <div class="d-flex align-items-center justify-content-between mb-2">
      <p class="small fw-bold text-uppercase text-muted mb-0">Scope</p>
      <a href="/settings/scope" class="btn btn-ghost btn-sm p-0 text-muted"
        aria-label="Edit scope in settings">
        <i class="if if-edit if--xs" aria-hidden="true"></i>
      </a>
    </div>

    <!-- State: 2 orgs + 2 type scopes active -->
    <div class="d-flex flex-column gap-1">
      <div class="d-flex align-items-center gap-1">
        <i class="if if-building if--xs text-muted flex-shrink-0" aria-hidden="true"></i>
        <span class="small">Faculty of Sciences</span>
      </div>
      <div class="d-flex align-items-center gap-1">
        <i class="if if-building if--xs text-muted flex-shrink-0" aria-hidden="true"></i>
        <span class="small">Faculty of Engineering</span>
      </div>
      <!--
        3+ orgs: replace last line above with:
        <a href="/settings/scope" class="small text-muted">+1 more</a>

        No scope set: replace entire block with:
        <span class="small text-muted">All organisations</span>
      -->
      <div class="d-flex flex-wrap gap-1 mt-1">
        <span class="badge bg-primary">Dataset</span>
        <span class="badge bg-primary">Dissertation</span>
      </div>
    </div>
  </div>

  <hr>

  <!-- ── Saved views ────────────────────────────────────────────────────────
       Named filter presets. Each is a stable URL with pre-applied params.
       Curator/proxy only — not shown for researcher role.
       Active view: aria-current="true" set server-side.
       Badge counts server-rendered; omit <span> entirely when count is 0.
  ──────────────────────────────────────────────────────────────────────── -->
  <div class="mb-3">
    <p class="small fw-bold text-uppercase text-muted mb-2">Views</p>
    <nav aria-label="Saved views">
      <ul class="list-unstyled mb-0">
        <li>
          <a href="?view=all"
            class="nav-link d-flex align-items-center gap-2 py-1 px-0 text-decoration-none">
            <i class="if if-list-unordered if--xs text-muted" aria-hidden="true"></i>
            All records
          </a>
        </li>
        <li>
          <a href="?view=needs-review&status=submitted"
            class="nav-link d-flex align-items-center gap-2 py-1 px-0 text-decoration-none fw-semibold"
            aria-current="true">
            <i class="if if-check-circle if--xs text-muted" aria-hidden="true"></i>
            Needs review
            <span class="badge bg-warning ms-auto" aria-label="12 items need review">12</span>
          </a>
        </li>
        <li>
          <a href="?view=missing-fulltext&oa=missing"
            class="nav-link d-flex align-items-center gap-2 py-1 px-0 text-decoration-none">
            <i class="if if-file if--xs text-muted" aria-hidden="true"></i>
            Missing full text
            <span class="badge bg-secondary ms-auto" aria-label="47 items missing full text">47</span>
          </a>
        </li>
        <li>
          <a href="?view=recently-updated&updated_since=7d"
            class="nav-link d-flex align-items-center gap-2 py-1 px-0 text-decoration-none">
            <i class="if if-time if--xs text-muted" aria-hidden="true"></i>
            Recently updated
          </a>
        </li>
      </ul>
    </nav>
    <button type="button" class="btn btn-ghost btn-sm px-0 mt-2 text-muted small">
      <i class="if if-add if--xs" aria-hidden="true"></i>
      Save current view
    </button>
  </div>

  <hr>

  <!-- ── Status ─────────────────────────────────────────────────────────────
       Workflow state first — curators care about this more than type.
       Counts come from OpenSearch facets; update on query change.
  ──────────────────────────────────────────────────────────────────────── -->
  <fieldset class="mb-3">
    <legend class="form-label h6 mb-2">Status</legend>
    <div class="d-flex form-check">
      <input class="form-check-input me-2" type="checkbox" id="fs-submitted" checked
        aria-label="Submitted (12 records)">
      <label class="form-check-label flex-grow-1" for="fs-submitted">Submitted</label>
      <span class="text-muted small" aria-hidden="true">12</span>
    </div>
    <div class="d-flex form-check">
      <input class="form-check-input me-2" type="checkbox" id="fs-published"
        aria-label="Published (3,802 records)">
      <label class="form-check-label flex-grow-1" for="fs-published">Published</label>
      <span class="text-muted small" aria-hidden="true">3,802</span>
    </div>
    <div class="d-flex form-check">
      <input class="form-check-input me-2" type="checkbox" id="fs-draft"
        aria-label="Draft (1,017 records)">
      <label class="form-check-label flex-grow-1" for="fs-draft">Draft</label>
      <span class="text-muted small" aria-hidden="true">1,017</span>
    </div>
  </fieldset>

  <hr>

  <!-- ── Type ───────────────────────────────────────────────────────────────
       Top 4 types shown; remainder collapsed. Bootstrap collapse — no JS needed.
  ──────────────────────────────────────────────────────────────────────── -->
  <fieldset class="mb-3">
    <legend class="form-label h6 mb-2">Type</legend>
    <div class="d-flex form-check">
      <input class="form-check-input me-2" type="checkbox" id="ft-journal"
        aria-label="Journal article (2,231 records)">
      <label class="form-check-label flex-grow-1" for="ft-journal">Journal article</label>
      <span class="text-muted small" aria-hidden="true">2,231</span>
    </div>
    <div class="d-flex form-check">
      <input class="form-check-input me-2" type="checkbox" id="ft-conference"
        aria-label="Conference (841 records)">
      <label class="form-check-label flex-grow-1" for="ft-conference">Conference</label>
      <span class="text-muted small" aria-hidden="true">841</span>
    </div>
    <div class="d-flex form-check">
      <input class="form-check-input me-2" type="checkbox" id="ft-dataset"
        aria-label="Dataset (312 records)">
      <label class="form-check-label flex-grow-1" for="ft-dataset">Dataset</label>
      <span class="text-muted small" aria-hidden="true">312</span>
    </div>
    <div class="d-flex form-check">
      <input class="form-check-input me-2" type="checkbox" id="ft-book"
        aria-label="Book (204 records)">
      <label class="form-check-label flex-grow-1" for="ft-book">Book</label>
      <span class="text-muted small" aria-hidden="true">204</span>
    </div>
    <div class="collapse" id="more-types">
      <div class="d-flex form-check">
        <input class="form-check-input me-2" type="checkbox" id="ft-chapter"
          aria-label="Book chapter (187 records)">
        <label class="form-check-label flex-grow-1" for="ft-chapter">Book chapter</label>
        <span class="text-muted small" aria-hidden="true">187</span>
      </div>
      <div class="d-flex form-check">
        <input class="form-check-input me-2" type="checkbox" id="ft-dissertation"
          aria-label="Dissertation (98 records)">
        <label class="form-check-label flex-grow-1" for="ft-dissertation">Dissertation</label>
        <span class="text-muted small" aria-hidden="true">98</span>
      </div>
      <div class="d-flex form-check">
        <input class="form-check-input me-2" type="checkbox" id="ft-misc"
          aria-label="Miscellaneous (141 records)">
        <label class="form-check-label flex-grow-1" for="ft-misc">Miscellaneous</label>
        <span class="text-muted small" aria-hidden="true">141</span>
      </div>
    </div>
    <button class="btn btn-ghost btn-sm px-0 mt-1 text-muted small" type="button"
      data-bs-toggle="collapse"
      data-bs-target="#more-types"
      aria-expanded="false"
      aria-controls="more-types">
      Show more
    </button>
  </fieldset>

  <hr>

  <!-- ── Year ───────────────────────────────────────────────────────────────
       Range inputs — more scalable than a checkbox list for year facets.
       Matches curator mental model of "a period" over individual years.
       HTMX attributes are stubs (prototype).
  ──────────────────────────────────────────────────────────────────────── -->
  <fieldset class="mb-3">
    <legend class="form-label h6 mb-2">Year</legend>
    <div class="d-flex gap-2 align-items-center">
      <div class="flex-grow-1">
        <label for="fy-from" class="visually-hidden">From year</label>
        <input type="number" id="fy-from" class="form-control form-control-sm"
          placeholder="From" min="1800" max="2099">
      </div>
      <span class="text-muted small" aria-hidden="true">–</span>
      <div class="flex-grow-1">
        <label for="fy-to" class="visually-hidden">To year</label>
        <input type="number" id="fy-to" class="form-control form-control-sm"
          placeholder="To" min="1800" max="2099">
      </div>
    </div>
  </fieldset>

  <hr>

  <!-- ── Access ─────────────────────────────────────────────────────────────
       "No file" is a backoffice-specific concern — curators need to track
       records that lack a full-text file. Not shown on the public surface.
  ──────────────────────────────────────────────────────────────────────── -->
  <fieldset class="mb-3">
    <legend class="form-label h6 mb-2">Access</legend>
    <div class="d-flex form-check">
      <input class="form-check-input me-2" type="checkbox" id="fa-oa"
        aria-label="Open access (2,901 records)">
      <label class="form-check-label flex-grow-1" for="fa-oa">Open access</label>
      <span class="text-muted small" aria-hidden="true">2,901</span>
    </div>
    <div class="d-flex form-check">
      <input class="form-check-input me-2" type="checkbox" id="fa-restricted"
        aria-label="Restricted (1,118 records)">
      <label class="form-check-label flex-grow-1" for="fa-restricted">Restricted</label>
      <span class="text-muted small" aria-hidden="true">1,118</span>
    </div>
    <div class="d-flex form-check">
      <input class="form-check-input me-2" type="checkbox" id="fa-nofile"
        aria-label="No file (812 records)">
      <label class="form-check-label flex-grow-1" for="fa-nofile">No file</label>
      <span class="text-muted small" aria-hidden="true">812</span>
    </div>
  </fieldset>

  <hr>

  <!-- ── More filters ───────────────────────────────────────────────────────
       Less-used dimensions. Opens the same filter editor as the Add filter
       button in the filter bar — same data-filter values, same JS handler.
  ──────────────────────────────────────────────────────────────────────── -->
  <div class="dropdown">
    <button class="btn btn-ghost btn-sm px-0 text-muted" type="button"
      data-bs-toggle="dropdown"
      aria-expanded="false">
      <i class="if if-add if--xs" aria-hidden="true"></i>
      More filters
    </button>
    <div class="dropdown-menu p-0">
      <div class="p-2">
        <label for="more-filter-search" class="visually-hidden">Search filters</label>
        <input type="search" id="more-filter-search" class="form-control form-control-sm"
          placeholder="Find a filter…" autocomplete="off">
      </div>
      <div id="more-filter-list">
        <p class="text-muted small fw-semibold text-uppercase px-3 pt-2 mb-1">People</p>
        <button class="dropdown-item py-2" type="button" data-filter="author">Author</button>
        <button class="dropdown-item py-2" type="button" data-filter="affiliation">Affiliation</button>
        <button class="dropdown-item py-2" type="button" data-filter="research_group">Research group</button>
        <hr class="dropdown-divider my-1">
        <p class="text-muted small fw-semibold text-uppercase px-3 pt-2 mb-1">Context</p>
        <button class="dropdown-item py-2" type="button" data-filter="project">Project / funding</button>
        <button class="dropdown-item py-2" type="button" data-filter="venue">Journal / venue</button>
        <hr class="dropdown-divider my-1">
        <p class="text-muted small fw-semibold text-uppercase px-3 pt-2 mb-1">Classification</p>
        <button class="dropdown-item py-2" type="button" data-filter="keywords">Keywords</button>
        <button class="dropdown-item py-2" type="button" data-filter="tags">Librarian tags</button>
      </div>
    </div>
  </div>

</aside>
