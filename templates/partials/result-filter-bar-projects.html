<!--
  HTMX partial: project directory filter bar (project-scoped)
  Used on: public-projects.html

  @include: templates/partials/result-filter-bar-projects.html

  Same chip + "Add filter" interaction as result-filter-bar-researchers.html,
  but the filter set is scoped to PROJECTS — Host faculty, Status (active /
  completed), Period (year range). The works-scoped result-filter-bar.html is
  for entity *detail* pages (a project's own output list).

  Behaviour lives in assets/js/filter-bar.js (pdir- config; no inline script —
  see docs/JAVASCRIPT.md). Chips are client-side only in the prototype; they do
  not refilter the list yet. Faculty values, status and period are stubs.
-->

<!-- position-relative anchors the editor overlay so it floats over the result
     list (position-absolute) instead of pushing it down when it opens. -->
<div class="position-relative">

  <!-- ── Active chips + Add filter ────────────────────────────────────────── -->
  <div class="d-flex flex-wrap align-items-center" id="pdir-filter-bar">

    <div role="group" aria-label="Active filters"
      class="d-flex gap-2 flex-wrap align-items-center"
      id="pdir-active-chips">
    </div>

    <div class="dropdown" id="pdir-add-filter-dropdown">
      <button class="btn btn-ghost btn-sm" type="button"
        id="pdir-add-filter-btn"
        data-bs-toggle="dropdown"
        data-bs-auto-close="outside"
        aria-expanded="false">
        <i class="if if-add if--xs" aria-hidden="true"></i>
        Add filter
      </button>

      <div class="dropdown-menu p-0">

        <div class="bt-dropdown-scroll" id="pdir-filter-picker-list">
          <button class="dropdown-item" type="button" data-filter="faculty">Host faculty</button>
          <button class="dropdown-item" type="button" data-filter="status">Status (active / completed)</button>
          <button class="dropdown-item" type="button" data-filter="period">Period</button>
        </div>
      </div>

      <button type="button" class="btn btn-ghost btn-sm"
        id="pdir-clear-all" hidden>
        <i class="if if-close" aria-hidden="true"></i>
        Clear all
      </button>
    </div>

  </div>

  <!-- ── Filter editor panel ──────────────────────────────────────────────── -->
  <div id="pdir-filter-editor" hidden
    class="bt-panel bt-panel--wide position-absolute top-100 start-0 w-100 mt-2"
    role="dialog"
    aria-modal="false"
    aria-labelledby="pdir-filter-editor-title">
  </div>

</div>
